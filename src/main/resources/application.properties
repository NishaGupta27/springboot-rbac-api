# Application Name
spring.application.name=springboot-rbac-api

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/rbac_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Logging Configuration
logging.level.root=INFO
logging.level.com.rbac=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=your-secret-key-min-256-chars-your-secret-key-min-256-chars-your-secret-key-min-256-chars
jwt.expiration=86400000